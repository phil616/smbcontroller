<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SMB Controller Login</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">
  <main class="auth-panel">
    <h1>SMB Controller</h1>
    <p>登录控制面板。首次使用请先在初始化页面创建管理员账户。</p>
    <form id="login-form">
      <label>用户名<input name="username" autocomplete="username" required></label>
      <label>密码<input name="password" type="password" autocomplete="current-password" required></label>
      <button type="submit">登录</button>
    </form>
    <div id="message" class="message"></div>
  </main>
  <script src="/static/js/api.js?v=20260423-2"></script>
  <script>
    api.get('/setup/status').then(s => { if (!s.initialized) location.href = '/setup'; });
    document.querySelector('#login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      const message = document.querySelector('#message');
      try {
        await api.post('/auth/login', { username: form.get('username'), password: form.get('password') });
        location.href = '/';
      } catch (error) {
        message.textContent = error.message;
      }
    });
  </script>
</body>
</html>
